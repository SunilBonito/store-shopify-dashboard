name: Build & Deploy Dashboard

on:
  push:
    paths:
      - 'Shopify_Dump.csv'   # triggers only when CSV changes
      - 'template.html'      # or when template changes
      - 'build.py'           # or when build script changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Build dashboard
        run: python3 build.py

      - name: Commit index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-build dashboard from CSV [skip ci]"
          git push
